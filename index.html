<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Melbourne Coffee Culture</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    body {
      margin: 40px;
      font-family: sans-serif;
      background-color: #fcfaf2;
    }

    .content {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      color: #4a3525;
      font-size: 56px;
      line-height: 1.1;
    }

    p {
      font-size: 22px;
    }

    .chart-box {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
  </style>
</head>

<body>
  <div class="content">
    <h1>The Heartbeat of<br>Melbourne’s Coffee Culture ☕</h1>

    <p>Which coffee sold well</p>

    <div id="vis1" class="chart-box"></div>
  </div>

  <script>
    const spec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",

      "title": {
        "text": "Coffee Sales by Weekday",
        "subtitle": "Number of orders for each coffee type by day of the week",
        "anchor": "start",
        "fontSize": 20,
        "color": "#4a3525"
      },

      "width": 850,
      "height": 420,

      "data": {
        "url": "Coffe_sales.csv",
        "format": {"type": "csv"}
      },

      "transform": [
        {
          "aggregate": [
            {
              "op": "count",
              "as": "orders"
            }
          ],
          "groupby": ["Weekday", "Weekdaysort", "coffee_name"]
        }
      ],

      "mark": {
        "type": "bar"
      },

      "encoding": {
        "x": {
          "field": "Weekday",
          "type": "ordinal",
          "sort": {
            "field": "Weekdaysort",
            "order": "ascending"
          },
          "axis": {
            "title": "Weekday"
          }
        },

        "y": {
          "field": "orders",
          "type": "quantitative",
          "axis": {
            "title": "Number of Orders"
          }
        },

        "color": {
          "field": "coffee_name",
          "type": "nominal",
          "title": "Coffee Name"
        },
        
        "tooltip": [
          {"field": "Weekday", "type": "ordinal", "title": "Weekday"},
          {"field": "coffee_name", "type": "nominal", "title": "Coffee"},
          {"field": "orders", "type": "quantitative", "title": "Orders"}
        ]
      }
    };

    vegaEmbed("#vis1", spec);
  </script>
</body>
</html>
