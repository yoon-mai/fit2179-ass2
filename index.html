<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Melbourne Coffee Culture</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    body {
      margin: 40px;
      font-family: sans-serif;
      background-color: #fcfaf2;
    }

    .content {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      color: #4a3525;
      font-size: 35px;
      line-height: 1.1;
    }

    p {
      font-size: 15px;
    }

    .chart-box {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
  </style>
</head>

<body>
  <div class="content">
    <h1>The Heartbeat of<br>Melbourne’s Coffee Culture ☕</h1>

    <p>Which coffee sold well</p>

    <div id="vis1" class="chart-box"></div>
    <br><br>
    <div id="vis2" class="chart-box"></div>
    <br><br>
    <div id="vis3" class="chart-box"></div>
    <br><br>
    <div id="vis4" class="chart-box"></div>
  </div>

  <script>
    const spec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",

      "title": {
        "text": "Coffee Sales by Weekday",
        "subtitle": "Number of orders for each coffee type by day of the week",
        "anchor": "start",
        "fontSize": 20,
        "color": "#4a3525"
      },

      "width": 850,
      "height": 420,

      "data": {
        "url": "Coffe_sales.csv",
        "format": {"type": "csv"}
      },

      "transform": [
        {
          "aggregate": [
            {
              "op": "count",
              "as": "orders"
            }
          ],
          "groupby": ["Weekday", "Weekdaysort", "coffee_name"]
        }
      ],

      "mark": {
        "type": "bar"
      },

      "encoding": {
        "x": {
          "field": "Weekday",
          "type": "ordinal",
          "sort": {
            "field": "Weekdaysort",
            "order": "ascending"
          },
          "axis": {
            "title": "Weekday"
          }
        },

        "y": {
          "field": "orders",
          "type": "quantitative",
          "axis": {
            "title": "Number of Orders"
          }
        },

        "color": {
          "field": "coffee_name",
          "type": "nominal",
          "title": "Coffee Name"
        },
        
        "tooltip": [
          {"field": "Weekday", "type": "ordinal", "title": "Weekday"},
          {"field": "coffee_name", "type": "nominal", "title": "Coffee"},
          {"field": "orders", "type": "quantitative", "title": "Orders"}
        ]
      }
    };

    vegaEmbed("#vis1", spec);




  
      const timeSpec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
    
      "title": {
        "text": "Coffee Orders by Time of Day",
        "subtitle": "When do people buy coffee the most?",
        "anchor": "start",
        "fontSize": 20,
        "color": "#4a3525"
      },
    
      "width": 850,
      "height": 420,
    
      "data": {
        "url": "Coffe_sales.csv",
        "format": {"type": "csv"}
      },
    
      "transform": [
        {
          "aggregate": [{"op": "count", "as": "orders"}],
          "groupby": ["Time_of_Day", "coffee_name"]
        }
      ],
    
      "mark": {"type": "bar"},
    
      "encoding": {
        "x": {
          "field": "Time_of_Day",
          "type": "ordinal",
          "axis": {"title": "Time of Day"}
        },
    
        "y": {
          "field": "orders",
          "type": "quantitative",
          "axis": {"title": "Number of Orders"}
        },
    
        "color": {
          "field": "coffee_name",
          "type": "nominal",
          "title": "Coffee Name"
        },
    
        "tooltip": [
          {"field": "Time_of_Day", "type": "ordinal", "title": "Time of Day"},
          {"field": "coffee_name", "type": "nominal", "title": "Coffee"},
          {"field": "orders", "type": "quantitative", "title": "Orders"}
        ]
      }
    };

  vegaEmbed("#vis2", timeSpec);

  const dateSpec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",

  "title": {
    "text": "Daily Coffee Orders Over Time",
    "subtitle": "Total number of coffee orders by date",
    "anchor": "start",
    "fontSize": 20,
    "color": "#4a3525"
  },

  "width": 850,
  "height": 420,

  "data": {
    "url": "Coffe_sales.csv",
    "format": {"type": "csv"}
  },

  "transform": [
    {
      "aggregate": [
        {"op": "count", "as": "orders"}
      ],
      "groupby": ["Date"]
    }
  ],

  "mark": {
    "type": "line",
    "point": true,
    "color": "#6F4E37"
  },

  "encoding": {
    "x": {
      "field": "Date",
      "type": "temporal",
      "axis": {
        "title": "Date",
        "format": "%b %d",
        "labelAngle": -45
      }
    },

    "y": {
      "field": "orders",
      "type": "quantitative",
      "axis": {
        "title": "Number of Orders"
      }
    },

    "tooltip": [
      {"field": "Date", "type": "temporal", "title": "Date"},
      {"field": "orders", "type": "quantitative", "title": "Orders"}
    ]
  }
};

vegaEmbed("#vis3", dateSpec);

 const mapSpec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "width": 850,
  "height": 500,

  "params": [
    {
      "name": "seating_select",
      "select": {"type": "point", "fields": ["Seating type"]},
      "bind": {
        "input": "select",
        "options": [null, "Seats - Indoor", "Seats - Outdoor"],
        "labels": ["Show All Seats", "Indoor Seats Only", "Outdoor Seats Only"],
        "name": "Filter Seating Type: "
      }
    }
  ],

  "data": {
    "url": "melbourne_cafes_2024.csv",
    "format": {"type": "csv"}
  },

  "transform": [
    {"filter": "datum.Latitude != null && datum.Longitude != null"},
    {"filter": {"param": "seating_select"}}
  ],

  "projection": {
    "type": "mercator"
  },

  "mark": {
    "type": "circle",
    "opacity": 0.45,
    "stroke": "#4a3525",
    "strokeWidth": 0.4
  },

  "encoding": {
    "longitude": {
      "field": "Longitude",
      "type": "quantitative"
    },
    "latitude": {
      "field": "Latitude",
      "type": "quantitative"
    },
    "size": {
      "field": "Number of seats",
      "type": "quantitative",
      "scale": {"range": [10, 250]},
      "legend": {"title": "Seats"}
    },
    "color": {
      "field": "CLUE small area",
      "type": "nominal",
      "legend": {"title": "Area"}
    },
    "tooltip": [
      {"field": "Census year", "type": "ordinal", "title": "Year"},
      {"field": "CLUE small area", "type": "nominal", "title": "Area"},
      {"field": "Seating type", "type": "nominal", "title": "Seating Type"},
      {"field": "Number of seats", "type": "quantitative", "title": "Seats"},
      {"field": "Longitude", "type": "quantitative", "title": "Longitude"},
      {"field": "Latitude", "type": "quantitative", "title": "Latitude"}
    ]
  }
};

vegaEmbed("#vis4", mapSpec).catch(console.error);
  </script>
</body>
</html>
